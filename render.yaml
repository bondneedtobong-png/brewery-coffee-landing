# Render Blueprint — free tier deploy of Brewery Coffee landing.
#
# ВАЖНО: на бесплатном тарифе Render нельзя подключить persistent disk.
# SQLite-файл живёт в эфемерной файловой системе и пересоздаётся
# сидом на каждом деплое через `npm run setup`. Для портфолио-демо
# это нормально: посетители всегда видят полный набор данных
# (юзеры, меню, отзывы, события). При апгрейде на платный план
# верните блок `disk:` и переменную DB_PATH=/data/app.db.

services:
  - type: web
    name: brewery-coffee-landing
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install && npm run setup
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "true"
      - key: SESSION_SECRET
        generateValue: true
